name: Node.js CI

on:
  push:
    branches:
      - 'release/*'
  pull_request:
    branches:
      - 'release/*'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    services:
      mysql:
        image: mysql:5
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cibbdd
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Copy .env.example to .env
        run: cp .env.example .env

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL..."
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL is up!"
              break
            fi
            echo "Waiting 1s..."
            sleep 1
          done

      - name: Run ESLint
        run: npx eslint .

      - name: Run migrations
        env:
          NODE_ENV: example
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: cibbdd
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DIALECT: mysql
        run: npm run migrations:run

      - name: Run tests
        env:
          NODE_ENV: example
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: cibbdd
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DIALECT: mysql
        run: npm test

      - name: Build application
        run: npm run build
