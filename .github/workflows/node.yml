name: Node.js CI

on:
  push:
    branches:
      - 'release/*'
  pull_request:
    branches:
      - 'release/*'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    services:
      mysql:
        image: mysql:5
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cibbdd
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Copy env.example to .env
        run: cp env.example .env

      - name: Wait for MySQL
        run: |
          echo "Waiting for MySQL..."
          until docker exec $(docker ps -qf "name=mysql") mysqladmin ping -uroot -proot --silent; do
            sleep 1
          done

      - name: Run Eslint
        run: npx eslint .

      - name: Run migrations
        env:
          NODE_ENV: test
        run: npm run migrate --if-present

      - name: Run tests
        env:
          NODE_ENV: test
        run: npm test

      - name: Build application
        run: npm run build

