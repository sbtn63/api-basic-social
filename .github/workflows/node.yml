name: Node.js CI

on:
  push:
    branches:
      - 'release/*'
  pull_request:
    branches:
      - 'release/*'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cibbdd
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Copy .env.example to .env
        run: cp .env.example .env

      - name: Run ESLint
        run: npx eslint .

      - name: Run migrations
        env:
          NODE_ENV: example
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: cibbdd
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DIALECT: mysql
        run: npx sequelize-cli db:migrate --env example

      - name: Run seeders
        env:
          NODE_ENV: example
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: cibbdd
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DIALECT: mysql
        run: npx sequelize-cli db:seed:all --env example

      - name: Run tests
        env:
          NODE_ENV: example
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: cibbdd
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DIALECT: mysql
        run: npm run coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=api-basic-social
            -Dsonar.organization=sbtn63
            -Dsonar.sources=src/
            -Dsonar.tests=test
            -Dsonar.test.inclusions=test/**/*.test.js
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/test/**,**/db/migrations/**,**/db/seeders/**,**/db/config/**
            
      - name: Build application
        run: npm run build
